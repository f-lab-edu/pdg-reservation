# application-prod.yml (운영 환경 설정)

# 1. 로깅 설정
logging:
  level:
    root: INFO

# 2. 스프링 옵션 세팅
spring:
  # 2-1. 데이터베이스(MySQL) 연결 설정
  datasource:
    # [운영] 실제 운영 DB 주소 (localhost가 아닐 확률이 높음, AWS RDS 등)
    url: jdbc:mysql://mysql:3306/reserv?serverTimezone=Asia/Seoul

    # [보안] 운영 DB 아이디/비번은 코드에 적지 말고, 서버의 '환경 변수'로 주입받는 것을 강력 추천
    # (예: 실행 시 -Dspring.datasource.username=admin 옵션 사용)
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  # 2-2. JPA (ORM) 설정
  jpa:
    hibernate:
      #ddl-auto: create
      ddl-auto: validate
        # [매우 중요] 절대 'create'나 'update' 금지!, 토이프로젝트라 구동 시에는 create 최초 사용
        # validate: 엔티티와 실제 테이블 스펙이 맞는지 검사만 함 (다르면 실행 안 됨)
        # none: 아예 아무것도 안 함 (가장 안전)
    properties:
      hibernate:
        format_sql: false                           # [성능] 로그 용량을 줄이기 위해 줄바꿈 없이 한 줄로 출력 (혹은 아예 끔)
        use_sql_comments: false                     # 주석 제거

    defer-datasource-initialization: false          # 운영에서는 초기 데이터를 넣을 일이 거의 없으므로 끔

  # 2-3. 초기 데이터(SQL) 실행 설정
  sql:
    init:
      mode: never                                   # [중요] 운영 DB에 data.sql(테스트 데이터)이 들어가면 대형 사고! 절대 실행 안 함.

  # 2-4. Redis 연결 설정
  data:
    redis:
      host: redis                               # 운영 Redis가 별도 서버라면 IP 변경 필요
      port: 6379

  # 카프카 설정
  kafka:
    # 카프카 브로커 접속 주소 (Docker Compose의 advertised listener와 일치해야 함)
    bootstrap-servers: kafka:9092

    # --- 프로듀서(Producer): 메시지를 보내는 API 서버 설정 ---
    producer:
      # 메시지 키(Key) 직렬화 방식: 주로 조회/파티셔닝 용도로 String 사용
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 메시지 값(Value) 직렬화 방식: 자바 객체(DTO)를 JSON 바이트로 변환
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # 메시지 전송 신뢰성 설정 (all: 모든 복제본에 저장 확인 / 1: 리더만 확인)
        acks: all
        # 배치 처리: 성능 향상을 위해 메시지를 모아서 보내는 최대 메모리 크기
        batch-size: 16384

    # --- 컨슈머(Consumer): 메시지를 받는 Worker 설정 ---
    consumer:
      # 같은 그룹 ID를 가진 컨슈머끼리 메시지를 나눠서 처리 (병렬 처리의 단위)
      group-id: reservation-group
      # 메시지 키 역직렬화: 카프카의 바이트 데이터를 다시 String으로 복원
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 실제 역직렬화기 대신 에러 핸들링 대리자를 지정
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      # 새로운 컨슈머 그룹이 생성되었을 때, 어디서부터 읽을지 결정 (earliest: 처음부터 / latest: 최신부터)
      auto-offset-reset: earliest
      properties:
        # 실제 작업은 내부의 JsonDeserializer에게 위임
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # [보안] 역직렬화 시 신뢰할 수 있는 패키지 경로 지정 (RCE 방어 필수 설정)
        spring.json.trusted.packages: "com.pdg.*"

# 3. JWT (토큰) 및 커스텀 설정
accessToken:
  expired:
    value: 1800                                     # [보안] 엑세스 토큰: 30분 (짧게 가져가는 것이 보안상 안전)
refreshToken:
  expired:
    value: 604800                                   # 리프레시 토큰: 7일 (사용자 편의성)

jwt:
  # [보안] 시크릿 키도 깃허브에 올라가지 않도록 환경변수로 빼는 것이 정석
  secret: ${JWT_SECRET_KEY}