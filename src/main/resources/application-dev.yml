# application-dev.yml (개발 환경 설정)

# 1. 로깅 설정
logging:
  level:
    root: INFO
    org.hibernate.SQL: OFF                        # [JPA] 실제 실행되는 SQL 쿼리를 로그로 출력 (show-sql 대체)
    org.hibernate.orm.jdbc.bind: OFF              # [JPA] SQL의 물음표(?) 파라미터에 들어가는 값을 표시 (Boot 3.x 기준)
    # (참고: Boot 2.x라면 org.hibernate.type.descriptor.sql.BasicBinder: TRACE 사용)
    p6spy: INFO                                   # P6Spy 로그는 INFO로 설정
    org.springframework.cache: TRACE              # 캐시 추상화 라이브러리의 로그 레벨을 TRACE로 올립니다.

# 2. P6Spy 상세 설정
decorator:
  datasource:
    p6spy:
      enable-logging: true

#2. 스프링 옵션 세팅
spring:
  # 2-1. 데이터베이스(MySQL) 연결 설정
  datasource:
    url: jdbc:mysql://localhost:3306/reserv?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    # 상세 해석:
    # - serverTimezone : 한국 시간 기준
    # - useSSL : 보안 접속 끔 (개발용)
    # - allowPublicKeyRetrieval : DBeaver 등 클라이언트 접속 오류 방지 옵션
    username: pdg
    password: qkreorhkd1!

  # 2-2. JPA (ORM) 설정
  jpa:
    hibernate:
      ddl-auto: create                              # [주의] 서버 시작 시 기존 테이블을 모두 삭제(Drop)하고 새로 생성(Create)
    properties:
      hibernate:
        format_sql: false                            # 로그에 찍히는 SQL을 한 줄이 아니라 보기 좋게 줄바꿈(Formatting)해서 출력
        use_sql_comments: false                     # 쿼리 로그 옆에 "이 쿼리가 왜 실행됐는지" 힌트(주석) 추가
    show-sql: false                                 # 하이버네이트 기본 출력 완전 차단
    defer-datasource-initialization: true           # [중요] Hibernate가 테이블을 다 만든 '후'에 data.sql을 실행하도록 지연시킴

  # 2-3. 초기 데이터(SQL) 실행 설정
  sql:
    init:
      mode: always                                  # 내장 DB가 아니더라도(MySQL) 항상 초기화 SQL을 실행
      data-locations: classpath:/initSql/data.sql   # 실행할 SQL 파일 경로 (resources/initSql/data.sql)

  # 2-4. Redis 연결 설정
  data:
    redis:
      host: localhost
      port: 6379

  # 카프카 설정
  kafka:
    # 카프카 브로커 접속 주소 (Docker Compose의 advertised listener와 일치해야 함)
    bootstrap-servers: localhost:29092

    # --- 프로듀서(Producer): 메시지를 보내는 API 서버 설정 ---
    producer:
      # 메시지 키(Key) 직렬화 방식: 주로 조회/파티셔닝 용도로 String 사용
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 메시지 값(Value) 직렬화 방식: 자바 객체(DTO)를 JSON 바이트로 변환
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # 메시지 전송 신뢰성 설정 (all: 모든 복제본에 저장 확인 / 1: 리더만 확인)
        acks: all
        # 배치 처리: 성능 향상을 위해 메시지를 모아서 보내는 최대 메모리 크기
        batch-size: 16384

    # --- 컨슈머(Consumer): 메시지를 받는 Worker 설정 ---
    consumer:
      # 같은 그룹 ID를 가진 컨슈머끼리 메시지를 나눠서 처리 (병렬 처리의 단위)
      group-id: reservation-group
      # 메시지 키 역직렬화: 카프카의 바이트 데이터를 다시 String으로 복원
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 실제 역직렬화기 대신 에러 핸들링 대리자를 지정
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      # 새로운 컨슈머 그룹이 생성되었을 때, 어디서부터 읽을지 결정 (earliest: 처음부터 / latest: 최신부터)
      auto-offset-reset: earliest
      properties:
        # 실제 작업은 내부의 JsonDeserializer에게 위임
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # [보안] 역직렬화 시 신뢰할 수 있는 패키지 경로 지정 (RCE 방어 필수 설정)
        spring.json.trusted.packages: "com.pdg.*"

# 3. JWT (토큰) 및 커스텀 설정
accessToken:
  expired:
    value: 86400                                    # 엑세스 토큰 만료 시간: 1일 (초 단위)
refreshToken:
  expired:
    value: 604800                                   # 리프레시 토큰 만료 시간: 7일 (초 단위)

